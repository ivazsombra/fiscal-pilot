<!doctype html>
<html>
<head><meta charset="utf-8"><title>Piloto Fiscal</title></head>
<body style="font-family: Arial; max-width: 900px; margin: 30px auto;">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2>Piloto Fiscal (Básico)</h2>
    <div>Usuario: <b>{{ user }}</b> | <a href="/logout">Salir</a></div>
  </div>

  <p style="color:#555">
    Plan avanzado: <b>{% if advanced_enabled %}ACTIVO{% else %}DESACTIVADO{% endif %}</b>
  </p>

  <form id="askForm">
    <label>Ejercicio fiscal</label><br>
    <select name="ejercicio" style="padding:8px;">
      <option value="2022">2022</option>
      <option value="2023">2023</option>
      <option value="2024">2024</option>
      <option value="2025" selected>2025</option>
      <option value="2026">2026</option>
    </select>

    <label style="margin-left:12px;">Top K</label>
    <input name="top_k" type="number" value="{{ default_top_k }}" min="3" max="20" style="width:70px; padding:8px;">

    <br><br>
    <label>Pregunta</label><br>
    <textarea name="question" required rows="4" style="width:100%; padding:10px;"></textarea><br><br>
    <button type="submit" style="padding:10px 14px;">Consultar</button>
  </form>

  <hr>

  <div id="result"></div>

  <script>
    const form = document.getElementById('askForm');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      result.innerHTML = "<p>Consultando…</p>";
      const formData = new FormData(form);

      const r = await fetch('/ask', { method:'POST', body: formData });
      if (!r.ok) {
        const t = await r.text();
        result.innerHTML = "<pre style='color:red; white-space:pre-wrap;'>" + t + "</pre>";
        return;
      }
      const data = await r.json();

      let html = "";
      html += `<p><b>Run:</b> ${data.run_id} | <b>Latencia:</b> ${data.latency_ms} ms</p>`;
      html += `<h3>Respuesta</h3><pre style="white-space:pre-wrap;">${data.answer}</pre>`;
      html += `<h3>Citas</h3><ol>`;
      for (const c of data.citations) {
        html += `<li><b>${c.source_filename}</b> (${c.doc_type || "n/a"}) DOF: ${c.published_date || "n/d"} | chunk: ${c.chunk_id}</li>`;
      }
      html += `</ol>`;

      html += `<h3>Feedback</h3>
        <form id="fbForm">
          <input type="hidden" name="run_id" value="${data.run_id}">
          <label><input type="radio" name="thumbs_up" value="true" checked> 👍</label>
          <label style="margin-left:10px;"><input type="radio" name="thumbs_up" value="false"> 👎</label><br><br>
          <textarea name="comment" rows="2" style="width:100%; padding:8px;" placeholder="Comentario opcional"></textarea><br><br>
          <button type="submit" style="padding:8px 12px;">Enviar feedback</button>
        </form>
      `;
      result.innerHTML = html;

      document.getElementById('fbForm').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const fd = new FormData(ev.target);
        const fr = await fetch('/feedback', { method:'POST', body: fd });
        if (fr.ok) alert("Gracias. Feedback guardado.");
        else alert("No se pudo guardar feedback.");
      });
    });
  </script>
</body>
</html>
